<!DOCTYPE html>
<html>
<head>
    <title>Open WebUI Link</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .link-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2em;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .link-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <a href="http://localhost:8080" class="link-button" target="_blank" rel="noopener noreferrer">
        Go to Open WebUI
    </a>
</body>
</html>
